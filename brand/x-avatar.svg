<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- background -->
  <rect width="400" height="400" fill="#0B0C0E"/>
  <!-- subtle radial glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#D7FF3F" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#D7FF3F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#glow)"/>
  <!-- mark: hex + K glyph, centered & scaled -->
  <g transform="translate(200,200) scale(4.4) translate(-32,-32)">
    <polygon points="32,4 56.78,18 56.78,46 32,60 7.22,46 7.22,18" fill="#D7FF3F"/>
    <g fill="none" stroke="#10130A" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="24" y1="19" x2="24" y2="45"/>
      <line x1="24" y1="32" x2="39" y2="19"/>
      <line x1="24" y1="32" x2="39" y2="45"/>
    </g>
  </g>
</svg>
