services:
  kairune:
    build:
      context: .
      dockerfile: Dockerfile
    image: kairune:latest
    container_name: kairune
    restart: unless-stopped
    ports:
      - "${PORT:-3040}:3040"
    environment:
      NODE_ENV: production
      PORT: 3040
      HOST: 0.0.0.0
      DB_PATH: /app/data/kairune.db
    volumes:
      - kairune-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3040/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kairune-data:
